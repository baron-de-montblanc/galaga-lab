objects:
 
  - name: M87
    aliases:
      - Virgo A
      - NGC 4486
      - 3C 274
    type: elliptical
    ra:  "12:30:49.42338"   # hour angle
    dec: "12:23:28.0439"    # degrees arcmin arcsec
    distance_mly: 53.5      # million light-years
    redshift: 0.00428
    magnitude:
      apparent_v: 8.6
      absolute_v: -22.4
    size_arcmin: 7.2         # angular diameter
    mass_msun: 2.4e12        # solar masses
    q: 0.82                  # axis ratio (minor/major)
    constellation: Virgo
    notes: >
      Giant elliptical galaxy at the center of the Virgo Cluster.
      Contains a supermassive black hole of ~6.5 billion solar masses,
      the first black hole ever directly imaged (Event Horizon Telescope, 2019).
      Notable for its relativistic jet extending ~5000 light-years.

  - name: Andromeda Galaxy
    aliases:
      - M31
      - NGC 224
    type: spiral
    ra:  "00:42:44.330"
    dec: "+41:16:09.40"
    distance_mly: 2.537
    redshift: -0.001001
    magnitude:
      apparent_v: 3.44
      absolute_v: -21.5
    size_arcmin: 190.0
    mass_msun: 1.0e12       
    q: 0.33                 
    constellation: Andromeda
    notes: >
      Nearest large spiral galaxy to the Milky Way and the most distant object
      visible to the naked eye. Contains roughly one trillion stars. On a
      collision course with the Milky Way, expected to merge in ~4.5 billion years.
  
  - name: Triangulum Galaxy
    aliases:
      - M33
      - NGC 598
    type: spiral
    ra:  "01:33:50.900"
    dec: "+30:39:36.70"
    distance_mly: 2.73
    redshift: -0.000607
    magnitude:
      apparent_v: 5.72
      absolute_v: -18.9
    size_arcmin: 70.8
    mass_msun: 5.0e10       
    q: 0.53                 
    constellation: Triangulum
    notes: >
      Third-largest galaxy in the Local Group. One of the most distant objects
      visible to the naked eye under ideal conditions. Notable for its prominent
      H II regions and lack of a central bulge.

  - name: Small Magellanic Cloud
    aliases:
      - SMC
      - NGC 292
    type: irregular
    ra:  "00:52:44.800"
    dec: "-72:49:43.00"
    distance_mly: 0.197
    redshift: 0.000527
    magnitude:
      apparent_v: 2.7
      absolute_v: -17.1
    size_arcmin: 318.0
    mass_msun: 7.0e9        
    q: 0.75                 
    constellation: Tucana
    notes: >
      Companion satellite galaxy to the Milky Way, gravitationally linked to the LMC.
      Connected to the Milky Way by the Magellanic Stream, a trail of neutral hydrogen gas.
      Visible to the naked eye from the Southern Hemisphere.

  - name: Centaurus A
    aliases:
      - NGC 5128
      - Caldwell 77
      - PKS 1322-427
    type: elliptical
    ra:  "13:25:27.615"
    dec: "-43:01:08.81"
    distance_mly: 13.7
    redshift: 0.001825
    magnitude:
      apparent_v: 6.84
      absolute_v: -21.9
    size_arcmin: 25.7
    mass_msun: 1.0e12      
    q: 0.77                
    constellation: Centaurus
    notes: >
      Nearest radio galaxy to Earth and one of the brightest radio sources in the sky.
      Features a dramatic dust lane bisecting its core, remnant of a past merger
      with a spiral galaxy. Powers a relativistic jet extending over a million light-years.

  - name: Whirlpool Galaxy
    aliases:
      - M51
      - NGC 5194
    type: spiral
    ra:  "13:29:52.700"
    dec: "+47:11:43.00"
    distance_mly: 23.0
    redshift: 0.001544
    magnitude:
      apparent_v: 8.4
      absolute_v: -21.6
    size_arcmin: 11.2
    mass_msun: 1.6e11
    q: 0.62
    constellation: Canes Venatici
    notes: >
      Grand-design spiral seen face-on, the first galaxy ever recognized as a
      spiral. Its prominent two-armed structure is being driven by an ongoing
      interaction with the smaller companion NGC 5195.

  - name: Sombrero Galaxy
    aliases:
      - M104
      - NGC 4594
    type: lenticular
    ra:  "12:39:59.400"
    dec: "-11:37:23.00"
    distance_mly: 31.1
    redshift: 0.003416
    magnitude:
      apparent_v: 8.0
      absolute_v: -21.8
    size_arcmin: 8.7
    mass_msun: 8.0e11
    q: 0.40
    constellation: Virgo
    notes: >
      Nearly edge-on galaxy with an unusually large central bulge and a striking
      dark dust lane that gives it a hat-like silhouette. Hosts a roughly
      one-billion-solar-mass central black hole and ~2000 globular clusters.

  - name: Cigar Galaxy
    aliases:
      - M82
      - NGC 3034
    type: starburst
    ra:  "09:55:52.200"
    dec: "+69:40:47.00"
    distance_mly: 11.5
    redshift: 0.000677
    magnitude:
      apparent_v: 8.41
      absolute_v: -19.6
    size_arcmin: 11.2
    mass_msun: 5.0e10
    q: 0.38
    constellation: Ursa Major
    notes: >
      Archetypal edge-on starburst galaxy, forming stars about ten times faster
      than the Milky Way. The intense activity was triggered by a gravitational
      encounter with its neighbor M81.

  - name: Large Magellanic Cloud
    aliases:
      - LMC
      - PGC 17223
    type: irregular
    ra:  "05:23:34.500"
    dec: "-69:45:22.00"
    distance_mly: 0.163
    redshift: 0.000874
    magnitude:
      apparent_v: 0.9
      absolute_v: -18.1
    size_arcmin: 645.0
    mass_msun: 2.7e10
    q: 0.85
    constellation: Dorado
    notes: >
      Largest and brightest satellite of the Milky Way and the most prominent
      irregular galaxy in the sky. Linked to the SMC by the Magellanic Stream
      and home to the Tarantula Nebula, the most active star-forming region in
      the Local Group.